---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  labels:
    istio.io/waypoint-for: all # only traffic destined for Services will be proxied through waypoint.
  name: waypoint # Deploys waypoint proxy to process L7's istio network features
  namespace: app
spec:
  gatewayClassName: istio-waypoint
  listeners:
  - name: mesh
    port: 15008
    protocol: HBONE
    allowedRoutes:
      namespaces:
        from: All
        selector:
          matchLabels:
            kubernetes.io/metadata.name: app # allow resources in a namespace to use this gateway